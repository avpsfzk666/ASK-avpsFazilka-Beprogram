 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK avpsFazilka - Be-Program AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: 70vh; overflow-y: auto; }
        .be-program-link { transition: transform 0.2s; }
        .be-program-link:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-blue-50 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-lg">
        <h1 class="text-2xl font-bold text-center">ASK avpsFazilka</h1>
        <div class="flex justify-center mt-4 space-x-4">
            <button onclick="updateMonth('current')" class="bg-blue-500 px-4 py-2 rounded-full hover:bg-blue-600">Present Month</button>
            <button onclick="updateMonth('next')" class="bg-blue-400 px-4 py-2 rounded-full hover:bg-blue-600">Coming Month</button>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div class="mb-6 text-center">
            <a href="https://sites.google.com/cbseshiksha.in/avps-students-announcements/be-program" 
               target="_blank" 
               class="be-program-link inline-block bg-orange-500 text-white font-bold py-3 px-6 rounded-lg shadow-md">
               📢 Official Be-Program Announcements
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-xl p-4 max-w-2xl mx-auto">
            <div id="userSelector" class="flex justify-around mb-4 border-b pb-4">
                <button onclick="setUser('Student')" class="text-sm font-semibold text-blue-600">Student</button>
                <button onclick="setUser('Parent')" class="text-sm font-semibold text-green-600">Parent</button>
                <button onclick="setUser('AV-Pedagogue')" class="text-sm font-semibold text-purple-600">AV-Pedagogue</button>
            </div>
            
            <div id="chatBox" class="chat-container mb-4 space-y-3 p-2 border rounded bg-gray-50 text-gray-700">
                <p class="italic text-gray-500 text-center">Select your role to start...</p>
            </div>

            <div class="flex space-x-2">
                <input id="userInput" type="text" placeholder="Ask about competitions, PTMs, or holidays..." 
                       class="flex-grow border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="startVoice()" class="bg-gray-200 p-3 rounded-lg hover:bg-gray-300">🎤</button>
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">Send</button>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION: Replace with your actual API endpoint or Key for GitHub Hosting
        const API_KEY = "YOUR_API_KEY_HERE"; 
        let currentUserRole = "";

        function setUser(role) {
            currentUserRole = role;
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="text-center font-bold text-blue-800 mt-2">Mode: ${role} Activated</div>`;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value || !currentUserRole) return;

            // Display User Message
            chatBox.innerHTML += `<div class="text-right"><span class="bg-blue-100 p-2 rounded-lg inline-block">${input.value}</span></div>`;
            
            // Logic Placeholder for Be-Program Sync [cite: 3, 20]
            // In a production app, you would fetch data from your linked Google Doc here.
            const response = `I am checking the av-pro-beProgram for you as a ${currentUserRole}...`;
            
            setTimeout(() => {
                chatBox.innerHTML += `<div class="text-left"><span class="bg-gray-200 p-2 rounded-lg inline-block">${response}</span></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);

            input.value = "";
        }

        // Multilingual Voice Support [cite: 2, 15]
        function startVoice() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'en-IN'; // Supports Indian English/Hindi nuance
                recognition.start();
                recognition.onresult = (event) => {
                    document.getElementById('userInput').value = event.results[0][0].transcript;
                };
            } else {
                alert("Voice command not supported in this browser.");
            }
        }
    </script>
</body>
</html>
